; MGB Dash 2026 — PlatformIO Multi-Environment Configuration
;
; Build all:    pio run
; Build one:    pio run -e servo_fuel
; Flash one:    pio run -e servo_fuel -t upload

[platformio]
default_envs = servo_fuel, servo_amps, servo_temp, speedometer, body_controller

; ── Shared defaults (all environments) ────────────────────────────
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
extra_scripts = pre:pre_build_version.py
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.3
    madhephaestus/ESP32Servo@^3.0.6
build_flags =
    -I../common/cpp
    -DCORE_DEBUG_LEVEL=5
    -DPIN_LED_DATA=14
    -DLED_COUNT=12

; ── Standard CAN + servo pins (used by Amps; Fuel and Temp have own pins) ──
; CAN pins match prototype hardware: GPIO 12 (TX) / GPIO 26 (RX)
; (GPIO 5/4 were unused common.h defaults, never wired on gauge boards)
[servo_pins]
build_flags =
    -DPIN_CAN_TX=12
    -DPIN_CAN_RX=26
    -DPIN_SERVO=27

; ── Servo Gauges ───────────────────────────────────────────────────
[env:servo_fuel]
build_src_filter = +<servo_gauge/>
build_flags =
    ${env.build_flags}
    -DGAUGE_ROLE=FUEL
    -DGAUGE_ROLE_NAME='"FUEL "'
    -DLOG_ROLE=LogRole::FUEL
    -DPIN_CAN_TX=12
    -DPIN_CAN_RX=26
    -DPIN_LED_DATA=14
    -DPIN_SERVO=27

[env:servo_amps]
build_src_filter = +<servo_gauge/>
build_flags =
    ${env.build_flags}
    ${servo_pins.build_flags}
    -DGAUGE_ROLE=AMPS
    -DGAUGE_ROLE_NAME='"AMPS "'
    -DLOG_ROLE=LogRole::AMPS

[env:servo_temp]
build_src_filter = +<servo_gauge/>
build_flags =
    ${env.build_flags}
    -DGAUGE_ROLE=TEMP
    -DGAUGE_ROLE_NAME='"TEMP "'
    -DLOG_ROLE=LogRole::TEMP
    -DPIN_CAN_TX=26
    -DPIN_CAN_RX=25
    -DPIN_LED_DATA=27
    -DPIN_SERVO=14

; ── Speedometer ────────────────────────────────────────────────────
[env:speedometer]
build_src_filter = +<speedometer/>
lib_deps =
    ${env.lib_deps}
    arduino-libraries/Stepper@^1.1.3
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11
build_flags =
    ${env.build_flags}
    -DGAUGE_ROLE=SPEED
    -DGAUGE_ROLE_NAME='"SPEED"'
    -DLOG_ROLE=LogRole::SPEED
    ; CAN pins — all signals on ideaspark left side
    -DPIN_CAN_TX=32
    -DPIN_CAN_RX=35
    ; 28BYJ-48 stepper via ULN2003 (4-pin coil control)
    ; Pins ordered to match ULN2003 header: IN1–IN4 top-to-bottom on ideaspark left side
    -DPIN_STEPPER_IN1=33
    -DPIN_STEPPER_IN2=25
    -DPIN_STEPPER_IN3=26
    -DPIN_STEPPER_IN4=27
    ; Optical home sensor (input-only pin, active-HIGH when marker detected)
    -DPIN_STEPPER_HOME=34
    ; Servo on GPIO13
    -DPIN_SERVO=13
    ; Integrated OLED display (SSD1306 128x64 I2C, hardwired on ideaspark board)
    ; No dedicated RST pin — OLED reset is tied to ESP32 EN line
    -DPIN_OLED_SDA=21
    -DPIN_OLED_SCL=22

; ── Body Controller ────────────────────────────────────────────────
; GPIO assignments confirmed via bench testing 2026-03-03
[env:body_controller]
build_src_filter = +<body_controller/>
build_flags =
    ${env.build_flags}
    -DGAUGE_ROLE=BODY
    -DGAUGE_ROLE_NAME='"BODY "'
    -DLOG_ROLE=LogRole::BODY
    ; CAN pins — body controller uses GPIO 12/25
    -DPIN_CAN_TX=12
    -DPIN_CAN_RX=25
    ; Hall sensor (driveshaft speed)
    -DPIN_HALL_SENSOR=35
    ; Confirmed signal inputs (2026-03-03 bench discovery)
    -DPIN_BRAKE=23
    -DPIN_REVERSE=22
    -DPIN_REGEN=21
    -DPIN_LEFT_TURN=27
    -DPIN_RIGHT_TURN=18
    ; Not wired this iteration:
    ; PIN_KEY_ON, PIN_KEY_START, PIN_KEY_ACCESSORY,
    ; PIN_HAZARD, PIN_RUNNING_LIGHTS, PIN_HEADLIGHTS,
    ; PIN_FAN, PIN_CHARGE_PORT
    ; Drivetrain constants
    -DDIFF_RATIO=3.909
    -DTIRE_DIAMETER_IN=26.5
    -DHALL_MAGNETS_PER_REV=2
    ; MGB 4-speed gear ratios (see docs/vehicle-specs.md)
    -DGEAR_RATIO_1=3.41
    -DGEAR_RATIO_2=2.166
    -DGEAR_RATIO_3=1.38
    -DGEAR_RATIO_4=1.00
    -DGEAR_RATIO_REV=3.09
    -DGEAR_TOLERANCE=0.15
    ; Odometer persistence
    -DODO_PERSIST_MILES=0.5
