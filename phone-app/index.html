<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>MGB DIAG</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <div id="header">
        <span class="title">MGB DIAG</span>
        <div class="mode-buttons">
            <button id="btn-demo" class="mode-btn">DEMO</button>
            <button id="btn-ble" class="mode-btn">BLE</button>
        </div>
        <span id="msg-rate" class="msg-rate">msgs: 0/s</span>
    </div>

    <!-- Signal grid (populated by ui.js) -->
    <div id="signal-grid"></div>

    <!-- Heartbeat bar (populated by ui.js) -->
    <div id="heartbeat-bar"></div>

    <!-- BLE status overlay -->
    <div id="ble-status">
        <div id="ble-msg" class="ble-msg">Connecting...</div>
        <button id="ble-dismiss">Dismiss</button>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
